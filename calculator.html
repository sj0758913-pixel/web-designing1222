<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <STYLE>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* background: rgba(0, 0, 0, 0.842); */
            background: #262525;
        }

        .head {
            color: rgb(252, 129, 6);
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            background-color: black;
            border-radius: 10px;
        }


        .calc {
            border: 5px solid #121213;
            padding: 20px;
            border-radius: 20px;
            background: transparent;
            box-shadow: 0px 2px 15px rgb(8, 1, 1);

        }

        .inp {
            width: 366px;
            height: 100px;
            text-align: end;
            font-size: 60px;
            padding-top: 10px;
            padding-right: 10px;
            background: transparent;
            border: 3px solid black;
            /* box-shadow: 1px 1px 10px rgba(13, 54, 137, 0.5); */
            border-radius: 20px;
            margin-left: 3px;
            /* margin-bottom: 20px; */
            color: rgba(245, 245, 245, 0.39);

        }
        
        .para{
            visibility: hidden;
            word-spacing: 5px;
             color: red;
             text-align: end;
             font-size: 15px;
             margin-right: 12px;
             margin-bottom: 10px;
             font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
             
        }
        button {

            margin: 10px 10px;
            width: 70px;
            height: 70px;
            background: rgb(0, 0, 11);
            color: rgb(252, 129, 6);
            font-size: larger;
            border-radius: 40px;
            border: transparent;
            /* box-shadow: 0px 2px 5px rgba(1, 172, 12, 0.949); */
        }

        button:hover {
            background-color: oldlace;
            color: black;
            transform: scale(1.05);
            transition: transform 0.3s ease;
            box-shadow: 0 2px 10px white;
        }

        .head:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 10px black;
        }

        @media (max-width: 480px) {
            .inp {
                width: 330px;
                height: 100px;
            }

            button {
                width: 60px;
                height: 60px;
            }
        }

        @media (max-width: 390px) {
            .inp {
                width: 250px;
                height: 80px;
                font-size: 40px;
            }

            button {
                width: 40px;
                height: 40px;
                font-size: small;

            }
        }
    </STYLE>

</head>

<body>
    <div class="calc">
        <h1 class="head">Basic calculator</h1>
        <div class="inp">0</div>
        <p class="para">* There is no space </p>
        <div>
            <button id="Ac">AC</button>
            <button id="Del">DEL</button>
            <button id="slash">/</button>
            <button id="modulo">%</button>
        </div>
        <div>
            <button id="seven">7</button>
            <button id="eight">8</button>
            <button id="nine">9</button>
            <button id="mul">x</button>
        </div>
        <div>
            <button id="four">4</button>
            <button id="five">5</button>
            <button id="six">6</button>
            <button id="minus">-</button>
        </div>
        <div>
            <button id="one">1</button>
            <button id="two">2</button>
            <button id="three">3</button>
            <button id="plus">+</button>
        </div>
        <div>
            <button id="Dzero">00</button>
            <button id="Szero">0</button>
            <button id="Dot">.</button>
            <button id="equals">=</button>
        </div>
    </div>


<script src="/JSS/Calculator.js"></script>
</body>

</html>
